version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: commerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: fastapi_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
        postgres:
          condition: service_started
        redis:
          condition: service_started
        rabbitmq:
          condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  worker:
    build: .
    container_name: sms_worker
    command: python -m app.shared.events.workers.sms_worker
    depends_on:
      - rabbitmq
      - redis
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data: